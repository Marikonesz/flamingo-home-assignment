name: Flamingo QA Automation

on:
  push:
    branches: [master, main]
  pull_request:
  # Actions → Flamingo QA Automation → Run workflow
  workflow_dispatch:
    inputs:
      ui_browser:
        description: "Browser for UI tests (chromium|firefox|webkit)"
        required: false
        default: chromium
        type: choice
        options:
          - chromium
          - firefox
          - webkit
      threads:
        description: "Parallel threads inside each shard"
        required: false
        default: "2"
        type: string
      shard_total:
        description: "Number of suite-wide shards (matrix is fixed to 3 jobs: indexes 0..2)"
        required: false
        default: "3"
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: flamingo-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (shard ${{ matrix.shard_index }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard_index: [0, 1, 2]
    env:
      UI_BROWSER: ${{ github.event.inputs.ui_browser || 'chromium' }}
      THREADS: ${{ github.event.inputs.threads || '2' }}
      SHARD_TOTAL: ${{ github.event.inputs.shard_total || '3' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Resolve Playwright version
        id: playwright
        run: |
          VERSION=$(mvn -B -q help:evaluate -Dexpression=playwright.version -DforceStdout)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ env.UI_BROWSER }}-${{ steps.playwright.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ env.UI_BROWSER }}-

      - name: Install Playwright browser
        run: |
          mvn -B -q dependency:resolve
          # On cache hit this is mostly a no-op for browser binaries; --with-deps still ensures OS libs.
          mvn -B -q exec:java -Dexec.classpathScope=test \
            -Dexec.mainClass=com.microsoft.playwright.CLI \
            -Dexec.args="install --with-deps ${UI_BROWSER}"

      - name: Run tests (shard)
        run: |
          mvn -B clean test \
            -Dshard.total=$SHARD_TOTAL \
            -Dshard.index=${{ matrix.shard_index }} \
            -Dthreads=$THREADS \
            -Dui.browser=$UI_BROWSER

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-shard-${{ matrix.shard_index }}
          path: target/allure-results
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Playwright traces (failed UI tests)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-shard-${{ matrix.shard_index }}
          path: target/traces
          if-no-files-found: ignore
          retention-days: 14

  report:
    name: merge-allure-and-pages
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download shard results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-shard-*
          path: allure-shards
          merge-multiple: false

      - name: Prepare merged allure-results
        run: |
          mkdir -p allure-results
          for dir in allure-shards/allure-results-shard-*; do
            if [ -d "$dir" ]; then
              cp -R "$dir"/. allure-results/ || true
            fi
          done
          echo "Merged $(find allure-results -type f | wc -l) result files"

      - name: Clean merged Allure results
        run: |
          python3 <<'PY'
          import json
          from collections import defaultdict
          from pathlib import Path

          root = Path("allure-results")
          STATUS_RANK = {
              "passed": 0,
              "failed": 1,
              "broken": 2,
              "skipped": 3,
              "unknown": 4,
          }

          def details_text(data):
              details = data.get("statusDetails") or {}
              return f"{details.get('message') or ''}\n{details.get('trace') or ''}"

          removed_skips = 0
          for path in list(root.glob("*-result.json")):
              try:
                  data = json.loads(path.read_text(encoding="utf-8"))
              except Exception:
                  continue
              text = details_text(data).lower()
              is_shard_skip = (
                  data.get("status") == "skipped"
                  and ("shard filter" in text or "not in shard" in text)
              )
              if is_shard_skip:
                  path.unlink(missing_ok=True)
                  removed_skips += 1

          by_key = defaultdict(list)
          for path in root.glob("*-result.json"):
              try:
                  data = json.loads(path.read_text(encoding="utf-8"))
              except Exception:
                  continue
              key = data.get("historyId") or data.get("fullName") or path.name
              by_key[key].append((path, data))

          removed_dupes = 0
          for items in by_key.values():
              if len(items) == 1:
                  continue
              items.sort(
                  key=lambda item: (
                      STATUS_RANK.get(item[1].get("status"), 99),
                      -(item[1].get("stop") or 0),
                  )
              )
              for path, _ in items[1:]:
                  path.unlink(missing_ok=True)
                  removed_dupes += 1

          remaining = list(root.glob("*-result.json"))
          print(f"Removed {removed_skips} shard-skip result(s), {removed_dupes} duplicate(s)")
          print(f"Remaining test results: {len(remaining)}")
          for path in sorted(remaining):
              data = json.loads(path.read_text(encoding="utf-8"))
              print(f"  {data.get('status')}: {data.get('name') or data.get('fullName')}")
          PY

      - name: Write Allure executor and environment
        id: meta
        run: |
          RUN_ID="run-${{ github.run_number }}-${GITHUB_SHA::7}"
          PAGES_BASE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          REPORT_URL="${PAGES_BASE}/allure/history/${RUN_ID}/"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "pages_base=$PAGES_BASE" >> "$GITHUB_OUTPUT"
          echo "report_url=$REPORT_URL" >> "$GITHUB_OUTPUT"

          # reportUrl must point at this run's archive (not /latest), or History links break after overwrite
          cat > allure-results/executor.json <<EOF
          {
            "name": "GitHub",
            "type": "github",
            "buildName": "${{ github.workflow }} #${{ github.run_number }}",
            "buildOrder": ${{ github.run_number }},
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportName": "Flamingo QA",
            "reportUrl": "${REPORT_URL}"
          }
          EOF
          {
            echo "Branch=${{ github.ref_name }}"
            echo "Commit=${GITHUB_SHA::7}"
            echo "Workflow=${{ github.workflow }}"
            echo "Run=${{ github.run_number }}"
            echo "Report=${REPORT_URL}"
          } > allure-results/environment.properties
          echo "Executor reportUrl=${REPORT_URL}"

      - name: Restore Allure history from gh-pages
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          rm -rf gh-pages-tmp
          git clone --branch gh-pages --single-branch --depth 1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
            gh-pages-tmp

          restore_from=""
          if [ -d gh-pages-tmp/allure/latest/history ] \
            && [ -f gh-pages-tmp/allure/latest/history/history.json ]; then
            restore_from="gh-pages-tmp/allure/latest/history"
          elif [ -d gh-pages-tmp/allure/history ]; then
            # Fallback: newest archived run that has history.json
            for d in $(ls -1 gh-pages-tmp/allure/history | sort -r); do
              if [ -f "gh-pages-tmp/allure/history/$d/history/history.json" ]; then
                restore_from="gh-pages-tmp/allure/history/$d/history"
                break
              fi
            done
          fi

          if [ -n "$restore_from" ]; then
            mkdir -p allure-results/history
            cp -R "$restore_from"/. allure-results/history/
            echo "Restored Allure history from: $restore_from"
            ls -la allure-results/history/
            python3 -c '
import json
from pathlib import Path
p = Path("allure-results/history/history.json")
data = json.loads(p.read_text(encoding="utf-8"))
print(f"history.json entries: {len(data)}")
trend = Path("allure-results/history/history-trend.json")
if trend.exists():
    print(f"history-trend points: {len(json.loads(trend.read_text(encoding="utf-8")))}")
'
          else
            echo "No previous Allure history on gh-pages (first publish is expected to have empty History tab)"
            find gh-pages-tmp -maxdepth 4 -type d -name history 2>/dev/null || true
          fi

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install Allure CLI
        run: |
          ALLURE_VERSION=2.32.0
          curl -fsSL -o allure.tgz \
            https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
          tar -xzf allure.tgz
          echo "$PWD/allure-${ALLURE_VERSION}/bin" >> $GITHUB_PATH

      - name: Generate Allure report
        run: |
          allure --version
          allure generate allure-results -o allure-report --clean
          python3 -c '
import json
from pathlib import Path
cases = list(Path("allure-report/data/test-cases").glob("*.json"))
with_hist = 0
for p in cases:
    extra = json.loads(p.read_text(encoding="utf-8")).get("extra") or {}
    hist = extra.get("history") or {}
    if hist.get("items"):
        with_hist += 1
print(f"Test cases with History tab data: {with_hist}/{len(cases)}")
'

      - name: Build Pages payload with history archive
        run: |
          RUN_ID="${{ steps.meta.outputs.run_id }}"
          mkdir -p site/allure/history/$RUN_ID
          mkdir -p site/allure/latest
          cp -R allure-report/. site/allure/latest/
          cp -R allure-report/. site/allure/history/$RUN_ID/

          {
            echo "<!DOCTYPE html><html><head><meta charset='utf-8'><title>Allure History</title>"
            echo "<style>body{font-family:sans-serif;max-width:800px;margin:2rem auto;padding:0 1rem}"
            echo "a{color:#0b57d0} li{margin:.4rem 0}</style></head><body>"
            echo "<h1>Allure reports</h1>"
            echo "<p><a href='./latest/index.html'><strong>Open latest report</strong></a></p>"
            echo "<h2>Run history</h2><ul>"
            if [ -d site/allure/history ]; then
              for d in $(ls -1 site/allure/history | sort -r); do
                echo "<li><a href='./history/$d/index.html'>$d</a></li>"
              done
            fi
            # Keep previous history entries from gh-pages if present
            if [ -d gh-pages-tmp/allure/history ]; then
              for d in $(ls -1 gh-pages-tmp/allure/history | sort -r); do
                if [ ! -d "site/allure/history/$d" ]; then
                  mkdir -p "site/allure/history/$d"
                  cp -R "gh-pages-tmp/allure/history/$d/." "site/allure/history/$d/"
                  echo "<li><a href='./history/$d/index.html'>$d</a></li>"
                fi
              done
            fi
            echo "</ul></body></html>"
          } > site/allure/index.html

          # Rebuild index including copied older runs
          {
            echo "<!DOCTYPE html><html><head><meta charset='utf-8'><title>Allure History</title>"
            echo "<style>body{font-family:sans-serif;max-width:800px;margin:2rem auto;padding:0 1rem}"
            echo "a{color:#0b57d0} li{margin:.4rem 0}</style></head><body>"
            echo "<h1>Allure reports</h1>"
            echo "<p><a href='./latest/index.html'><strong>Open latest report</strong></a></p>"
            echo "<h2>Run history</h2><ul>"
            for d in $(ls -1 site/allure/history | sort -r); do
              echo "<li><a href='./history/$d/index.html'>$d</a></li>"
            done
            echo "</ul></body></html>"
          } > site/allure/index.html

          # Root entry so https://…github.io/<repo>/ does not 404
          {
            echo "<!DOCTYPE html><html><head><meta charset='utf-8'>"
            echo "<meta http-equiv='refresh' content='0; url=allure/latest/index.html'>"
            echo "<title>Flamingo QA</title></head><body>"
            echo "<p>Open the <a href='allure/latest/index.html'>latest Allure report</a>.</p>"
            echo "<p>Or the <a href='allure/index.html'>run history index</a>.</p>"
            echo "</body></html>"
          } > site/index.html

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 30

      - name: Publish to GitHub Pages
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: false
          destination_dir: .
